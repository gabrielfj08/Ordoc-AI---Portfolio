services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ordoc_postgres
    environment:
      POSTGRES_DB: ordoc_ai
      POSTGRES_USER: ordoc_user
      POSTGRES_PASSWORD: ordoc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ordoc_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ordoc_user -d ordoc_ai" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ordoc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ordoc_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Solr Search Engine
  solr:
    image: solr:9.4-slim
    container_name: ordoc_solr
    ports:
      - "8983:8983"
    environment:
      - SOLR_HEAP=512m
    volumes:
      - solr_data:/var/solr
      - ./solr/configsets:/opt/solr/server/solr/configsets
    networks:
      - ordoc_network
    command: >
      bash -c "
        solr-precreate ordoc_workflow /opt/solr/server/solr/configsets/ordoc_workflow &&
        solr-precreate ordoc_documents /opt/solr/server/solr/configsets/ordoc_documents
      "
    healthcheck:
      test: [ "CMD-SHELL", "curl -f 'http://localhost:8983/solr/admin/cores?action=STATUS' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ordoc_backend
    environment:
      - DEBUG=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=ordoc_ai
      - DB_USER=ordoc_user
      - DB_PASSWORD=ordoc_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SOLR_URL=http://solr:8983/solr
      - SOLR_COLLECTION=ordoc_documents
      - SOLR_USERNAME=
      - SOLR_PASSWORD=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=ordoc_ai.settings
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ordoc_network
    command: >
      bash -c "
        python manage.py collectstatic --noinput &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ordoc_celery_worker
    environment:
      - DEBUG=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=ordoc_ai
      - DB_USER=ordoc_user
      - DB_PASSWORD=ordoc_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SOLR_URL=http://solr:8983/solr
      - SOLR_COLLECTION=ordoc_documents
      - SOLR_USERNAME=
      - SOLR_PASSWORD=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=ordoc_ai.settings
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - ordoc_network
    command: celery -A ordoc_ai worker -l info --concurrency=2
    healthcheck:
      test: [ "CMD", "celery", "-A", "ordoc_ai", "inspect", "ping" ]
      interval: 60s
      timeout: 10s
      retries: 3

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ordoc_celery_beat
    environment:
      - DEBUG=True
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=ordoc_ai
      - DB_USER=ordoc_user
      - DB_PASSWORD=ordoc_password
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SOLR_URL=http://solr:8983/solr
      - SOLR_COLLECTION=ordoc_documents
      - SOLR_USERNAME=
      - SOLR_PASSWORD=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=ordoc_ai.settings
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat-schedule
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - ordoc_network
    command: celery -A ordoc_ai beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import celery; app = celery.Celery(broker=\"redis://redis:6379/0\"); app.connection().connect()' || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ordoc_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites-available:/etc/nginx/sites-available
      - ./nginx/ssl:/etc/nginx/ssl
      - static_files:/var/www/static
      - media_files:/var/www/media
    depends_on:
      - backend
    networks:
      - ordoc_network
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama - Local LLM Server for Intelligence Council
  ollama:
    image: ollama/ollama:latest
    container_name: ordoc_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ordoc_network
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  solr_data:
    driver: local
  media_files:
    driver: local
  static_files:
    driver: local
  celery_beat_data:
    driver: local
  ollama_data:
    driver: local

networks:
  ordoc_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
