# Sample configuration file for Shoryuken.
# Options here can still be overridden by cmd line args.
# Place this file at config/shoryuken.yml and Shoryuken will
# pick it up automatically.
---
:concurrency: 1
:delay: 0

# Shoryuken will run this file through ERB when reading it so you can
# even put in dynamic logic, like a host-specific queue.
# https://github.com/ruby-shoryuken/shoryuken/wiki/Multiple-ways-of-configuring-queues-in-Shoryuken
:queues:
  - solr-<%= ENV['RAILS_ENV'] %>
  - solr-v2-<%= ENV['RAILS_ENV'] %>

# you can override concurrency based on environment
# production:
#   :concurrency: 10
# staging:
#   :concurrency: 10
