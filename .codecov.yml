# Codecov Configuration for OrdocAI
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    # Overall project coverage
    project:
      default:
        target: auto  # Maintain current coverage
        threshold: 1%  # Allow 1% decrease
        informational: false  # Fail CI if coverage decreases

    # Coverage for changed code (patch)
    patch:
      default:
        target: 70%  # New code must have 70%+ coverage
        threshold: 5%
        informational: false

  precision: 2  # 2 decimal places (e.g., 75.42%)
  round: down
  range: "60...100"  # Green at 100%, red at 60%

# Flags for different components
flag_management:
  default_rules:
    carryforward: true  # Carry forward previous coverage if not uploaded
    statuses:
      - type: project
        target: auto
      - type: patch
        target: 70%

  individual_flags:
    # Backend (Python/Django)
    - name: backend
      paths:
        - backend/
        - test/backend/
      carryforward: true
      statuses:
        - type: project
          target: 75%  # Backend target: 75%+
          threshold: 2%
        - type: patch
          target: 80%  # New backend code: 80%+

    # Frontend (TypeScript/Next.js)
    - name: frontend
      paths:
        - frontend-new/
        - test/frontend/
      carryforward: true
      statuses:
        - type: project
          target: 60%  # Frontend target: 60%+
          threshold: 2%
        - type: patch
          target: 70%  # New frontend code: 70%+

# Comment configuration
comment:
  layout: "reach,diff,flags,tree"
  behavior: default  # Update comment on each push
  require_changes: true  # Only comment if coverage changed
  require_base: false  # Comment even if base commit has no coverage
  require_head: true  # Only comment if head commit has coverage
  hide_project_coverage: false

# GitHub checks
github_checks:
  annotations: true  # Annotate lines with missing coverage

# Ignore paths (don't include in coverage calculation)
ignore:
  # Test files
  - "test/**/*"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.test.py"
  - "**/conftest.py"
  - "**/factories/**"

  # Database migrations
  - "**/migrations/**"

  # Configuration files
  - "**/settings*.py"
  - "**/__init__.py"

  # Build artifacts
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.next/**"

  # Generated files
  - "**/*.min.js"
  - "**/*.bundle.js"

# Fixes paths (if uploads come from different directories)
fixes:
  - "before/"  # Remove prefix if needed
