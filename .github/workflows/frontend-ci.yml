name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend-new/**'
      - 'test/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend-new/**'
      - 'test/frontend/**'

jobs:
  test:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: 'frontend-new/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ./frontend-new
        run: pnpm install --frozen-lockfile

      - name: Run linting (ESLint)
        working-directory: ./frontend-new
        run: pnpm lint
        continue-on-error: true

      - name: Run type checking (TypeScript)
        working-directory: ./frontend-new
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run unit tests (Jest)
        working-directory: ./frontend-new
        run: pnpm test:coverage
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend-new/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend-new/coverage/
          retention-days: 30

      - name: Build application
        working-directory: ./frontend-new
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'frontend-new/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ./frontend-new
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./frontend-new
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./frontend-new
        run: pnpm test:e2e
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-new/playwright-report/
          retention-days: 30
