name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ordoc_ai
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry
      - name: Install backend dependencies
        run: |
          cd backend
          poetry config virtualenvs.create false
          poetry install --only=main --no-root
      - name: Run Django migrations
        run: |
          cd backend
          python manage.py migrate --noinput
        env:
          DEBUG: 'False'
          SECRET_KEY: 'test-secret-key-for-ci-workflow-ordoc-ai-2025'
          DB_ENGINE: 'django.db.backends.postgresql'
          DB_NAME: 'ordoc_ai'
          DB_USER: 'postgres'
          DB_PASSWORD: 'postgres'
          DB_HOST: '127.0.0.1'
          DB_PORT: '5432'
          REDIS_URL: 'redis://127.0.0.1:6379/0'
          ALLOWED_HOSTS: 'localhost,127.0.0.1'
          CELERY_BROKER_URL: 'redis://127.0.0.1:6379/0'
          CELERY_RESULT_BACKEND: 'redis://127.0.0.1:6379/0'
      - name: Run Django checks
        run: |
          cd backend
          python manage.py check --deploy
        env:
          DEBUG: 'False'
          SECRET_KEY: 'test-secret-key-for-ci-workflow-ordoc-ai-2025'
          DB_ENGINE: 'django.db.backends.postgresql'
          DB_NAME: 'ordoc_ai'
          DB_USER: 'postgres'
          DB_PASSWORD: 'postgres'
          DB_HOST: '127.0.0.1'
          DB_PORT: '5432'
          REDIS_URL: 'redis://127.0.0.1:6379/0'
          ALLOWED_HOSTS: 'localhost,127.0.0.1'
          CELERY_BROKER_URL: 'redis://127.0.0.1:6379/0'
          CELERY_RESULT_BACKEND: 'redis://127.0.0.1:6379/0'
      - name: Run backend security audit
        run: |
          pip install pip-audit
          cd backend
          # Install poetry export plugin
          poetry self add poetry-plugin-export
          poetry export --format=requirements.txt --output=temp-requirements.txt --without-hashes
          pip-audit --requirement temp-requirements.txt --format=json --output=audit-report.json || true
          rm temp-requirements.txt
          echo "Security audit completed (warnings allowed)"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/ordoc-ai-frontend/package-lock.json'
      - name: Install dependencies
        run: |
          cd frontend/ordoc-ai-frontend
          npm ci
      - name: Run TypeScript check
        run: |
          cd frontend/ordoc-ai-frontend
          npx tsc --noEmit
      - name: Run lint
        run: |
          cd frontend/ordoc-ai-frontend
          npm run lint
      - name: Build project
        run: |
          cd frontend/ordoc-ai-frontend
          npm run build
      - name: Run security audit
        run: |
          cd frontend/ordoc-ai-frontend
          npm audit --audit-level=moderate --production || true
          echo "Security audit completed (warnings allowed)"
