name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
      - name: Run Django checks
        run: |
          cd backend
          python manage.py check --deploy
      - name: Run backend security audit
        run: |
          pip install pip-audit
          cd backend
          pip-audit --requirement requirements.txt --format=json --output=audit-report.json || true
          echo "Security audit completed (warnings allowed)"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/ordoc-ai-frontend/package-lock.json'
      - name: Install dependencies
        run: |
          cd frontend/ordoc-ai-frontend
          npm ci
      - name: Run TypeScript check
        run: |
          cd frontend/ordoc-ai-frontend
          npx tsc --noEmit
      - name: Run lint
        run: |
          cd frontend/ordoc-ai-frontend
          npm run lint
      - name: Build project
        run: |
          cd frontend/ordoc-ai-frontend
          npm run build
      - name: Run security audit
        run: |
          cd frontend/ordoc-ai-frontend
          npm audit --audit-level=moderate --production || true
          echo "Security audit completed (warnings allowed)"
