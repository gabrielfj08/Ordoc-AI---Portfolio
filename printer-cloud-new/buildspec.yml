version: 0.2

env:
  secrets-manager:
    AWS_ACCESS_KEY_ID_STAGING: 'staging/printer-cloud-frontend/build:AWS_ACCESS_KEY_ID'
    AWS_SECRET_ACCESS_KEY_STAGING: 'staging/printer-cloud-frontend/build:AWS_SECRET_ACCESS_KEY'
    NEXT_PUBLIC_APP_ENV_STAGING: 'staging/printer-cloud-frontend/build:NEXT_PUBLIC_APP_ENV'
    NEXT_PUBLIC_API_URL_STAGING: 'staging/printer-cloud-frontend/build:NEXT_PUBLIC_API_URL'
    NEXT_PUBLIC_FLOW_URL_STAGING: 'staging/printer-cloud-frontend/build:NEXT_PUBLIC_FLOW_URL'
    NEXT_PUBLIC_RECAPTCHA_SITE_KEY_STAGING: 'staging/printer-cloud-frontend/build:NEXT_PUBLIC_RECAPTCHA_SITE_KEY'
    NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE_STAGING: 'staging/printer-cloud-frontend/build:NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE'
    NEXT_PUBLIC_EXTERNAL_USER_ID_STAGING: 'staging/printer-cloud-frontend/build:NEXT_PUBLIC_EXTERNAL_USER_ID'
    RECAPTCHA_SECRET_KEY_STAGING: 'staging/printer-cloud-frontend/build:RECAPTCHA_SECRET_KEY'
    RECAPTCHA_SECRET_KEY_INVISIBLE_STAGING: 'staging/printer-cloud-frontend/build:RECAPTCHA_SECRET_KEY_INVISIBLE'
    AWS_ACCESS_KEY_ID_PRODUCTION: 'production/printer-cloud-frontend/build:AWS_ACCESS_KEY_ID'
    AWS_SECRET_ACCESS_KEY_PRODUCTION: 'production/printer-cloud-frontend/build:AWS_SECRET_ACCESS_KEY'
    NEXT_PUBLIC_APP_ENV_PRODUCTION: 'production/printer-cloud-frontend/build:NEXT_PUBLIC_APP_ENV'
    NEXT_PUBLIC_API_URL_PRODUCTION: 'production/printer-cloud-frontend/build:NEXT_PUBLIC_API_URL'
    NEXT_PUBLIC_FLOW_URL_PRODUCTION: 'production/printer-cloud-frontend/build:NEXT_PUBLIC_FLOW_URL'
    NEXT_PUBLIC_RECAPTCHA_SITE_KEY_PRODUCTION: 'production/printer-cloud-frontend/build:NEXT_PUBLIC_RECAPTCHA_SITE_KEY'
    NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE_PRODUCTION: 'production/printer-cloud-frontend/build:NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE'
    NEXT_PUBLIC_EXTERNAL_USER_ID_PRODUCTION: 'production/printer-cloud-frontend/build:NEXT_PUBLIC_EXTERNAL_USER_ID'
    RECAPTCHA_SECRET_KEY_PRODUCTION: 'production/printer-cloud-frontend/build:RECAPTCHA_SECRET_KEY'
    RECAPTCHA_SECRET_KEY_INVISIBLE_PRODUCTION: 'production/printer-cloud-frontend/build:RECAPTCHA_SECRET_KEY_INVISIBLE'
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 698497033648.dkr.ecr.sa-east-1.amazonaws.com
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - echo $CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker build -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-staging:$CODEBUILD_RESOLVED_SOURCE_VERSION -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-staging:latest --build-arg AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID_STAGING --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY_STAGING --build-arg NEXT_PUBLIC_APP_ENV=$NEXT_PUBLIC_APP_ENV_STAGING --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL_STAGING --build-arg NEXT_PUBLIC_FLOW_URL=$NEXT_PUBLIC_FLOW_URL_STAGING --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY=$NEXT_PUBLIC_RECAPTCHA_SITE_KEY_STAGING --build-arg NEXT_PUBLIC_EXTERNAL_USER_ID=$NEXT_PUBLIC_EXTERNAL_USER_ID_STAGING --build-arg RECAPTCHA_SECRET_KEY=$RECAPTCHA_SECRET_KEY_STAGING .
      - docker build -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-staging:$CODEBUILD_RESOLVED_SOURCE_VERSION -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-staging:latest --build-arg AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID_STAGING --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY_STAGING --build-arg NEXT_PUBLIC_APP_ENV=$NEXT_PUBLIC_APP_ENV_STAGING --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL_STAGING --build-arg NEXT_PUBLIC_FLOW_URL=$NEXT_PUBLIC_FLOW_URL_STAGING --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE=$NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE_STAGING --build-arg NEXT_PUBLIC_EXTERNAL_USER_ID=$NEXT_PUBLIC_EXTERNAL_USER_ID_STAGING --build-arg RECAPTCHA_SECRET_KEY_INVISIBLE=$RECAPTCHA_SECRET_KEY_INVISIBLE_STAGING .
      - docker build -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-production:$CODEBUILD_RESOLVED_SOURCE_VERSION -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-production:latest --build-arg AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID_PRODUCTION --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY_PRODUCTION --build-arg NEXT_PUBLIC_APP_ENV=$NEXT_PUBLIC_APP_ENV_PRODUCTION --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL_PRODUCTION --build-arg NEXT_PUBLIC_FLOW_URL=$NEXT_PUBLIC_FLOW_URL_PRODUCTION --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY=$NEXT_PUBLIC_RECAPTCHA_SITE_KEY_PRODUCTION --build-arg NEXT_PUBLIC_EXTERNAL_USER_ID=$NEXT_PUBLIC_EXTERNAL_USER_ID_PRODUCTION --build-arg RECAPTCHA_SECRET_KEY=$RECAPTCHA_SECRET_KEY_PRODUCTION .
      - docker build -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-production:$CODEBUILD_RESOLVED_SOURCE_VERSION -t 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-production:latest --build-arg AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID_PRODUCTION --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY_PRODUCTION --build-arg NEXT_PUBLIC_APP_ENV=$NEXT_PUBLIC_APP_ENV_PRODUCTION --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL_PRODUCTION --build-arg NEXT_PUBLIC_FLOW_URL=$NEXT_PUBLIC_FLOW_URL_PRODUCTION --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE=$NEXT_PUBLIC_RECAPTCHA_SITE_KEY_INVISIBLE_PRODUCTION --build-arg NEXT_PUBLIC_EXTERNAL_USER_ID=$NEXT_PUBLIC_EXTERNAL_USER_ID_PRODUCTION --build-arg RECAPTCHA_SECRET_KEY_INVISIBLE=$RECAPTCHA_SECRET_KEY_INVISIBLE_PRODUCTION .
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-staging:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-staging:latest
      - docker push 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-production:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push 698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-production:latest
      - printf "[{\"name\":\"printer-cloud-frontend\",\"imageUri\":\"698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-staging:$CODEBUILD_RESOLVED_SOURCE_VERSION\"}]" > printer-cloud-frontend-staging.json
      - printf "[{\"name\":\"printer-cloud-frontend\",\"imageUri\":\"698497033648.dkr.ecr.sa-east-1.amazonaws.com/printer-cloud-frontend-production:$CODEBUILD_RESOLVED_SOURCE_VERSION\"}]" > printer-cloud-frontend-production.json
artifacts:
  files:
    - printer-cloud-frontend-staging.json
    - printer-cloud-frontend-production.json
