version: '3.8'

# As credenciais abaixo sao apenas para desenvolvimento local.
# Em producao defina valores seguros via variaveis de ambiente
# (por exemplo usando um arquivo `.env`). Veja `.env.example`
# para saber quais chaves configurar.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ordoc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ordoc_ai
      POSTGRES_USER: ordoc_user
      POSTGRES_PASSWORD: ordoc_password
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ordoc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordoc_user -d ordoc_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: ordoc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ordoc_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ordoc_backend
    restart: unless-stopped
    environment:
      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ordoc_ai
      DB_USER: ordoc_user
      DB_PASSWORD: ordoc_password
      DB_HOST: postgres
      DB_PORT: 5432
      
      # Redis/Celery
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      
      # Django
      DEBUG: "True"
      SECRET_KEY: "django-insecure-ordoc-ai-development-key-change-in-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      
      # Superuser
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-changeme}
      
      # AWS (for development, use local storage)
      USE_S3: "False"
      MEDIA_ROOT: /app/media
      STATIC_ROOT: /app/staticfiles
      
      # OCR
      TESSERACT_CMD: tesseract
      
      # Solr
      SOLR_URL: http://solr:8983/solr
      SOLR_COLLECTION: ordoc_core
      SOLR_USERNAME: ''
      SOLR_PASSWORD: ''
      
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ordoc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ordoc_celery_worker
    restart: unless-stopped
    command: celery -A ordoc_ai worker -l info
    environment:
      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ordoc_ai
      DB_USER: ordoc_user
      DB_PASSWORD: ordoc_password
      DB_HOST: postgres
      DB_PORT: 5432
      
      # Redis/Celery
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      
      # Django
      DEBUG: "True"
      SECRET_KEY: "django-insecure-ordoc-ai-development-key-change-in-production"
      
      # OCR
      TESSERACT_CMD: tesseract
      
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - ordoc_network

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ordoc_celery_beat
    restart: unless-stopped
    command: celery -A ordoc_ai beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ordoc_ai
      DB_USER: ordoc_user
      DB_PASSWORD: ordoc_password
      DB_HOST: postgres
      DB_PORT: 5432
      
      # Redis/Celery
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      
      # Django
      DEBUG: "True"
      SECRET_KEY: "django-insecure-ordoc-ai-development-key-change-in-production"
      
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - ordoc_network

  # Solr (for future search functionality)
  solr:
    image: solr:9-slim
    container_name: ordoc_solr
    restart: unless-stopped
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
      - ./docker/solr/ordoc_core:/opt/solr/server/solr/ordoc_core
    networks:
      - ordoc_network
    command: 
      - solr-precreate
      - ordoc_core

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
  solr_data:
    driver: local

networks:
  ordoc_network:
    driver: bridge
