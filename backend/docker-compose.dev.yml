# Development Docker Compose for Ordoc-AI
# This extends the main docker-compose.yml with development-specific settings

version: '3.8'

services:
  backend:
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend,host.docker.internal"
    volumes:
      - .:/app
      - /app/.venv  # Exclude venv from volume mount
    ports:
      - "8000:8000"
      - "8001:8001"  # Additional port for debugging
    command: python manage.py runserver 0.0.0.0:8000

  # Development database with exposed port
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ordoc_ai
      POSTGRES_USER: ordoc_user
      POSTGRES_PASSWORD: ordoc_password

  # Development Redis with exposed port
  redis:
    ports:
      - "6379:6379"

  # Celery worker for development
  celery_worker:
    volumes:
      - .:/app
      - /app/.venv
    environment:
      DEBUG: "True"

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ordoc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ordoc_network
