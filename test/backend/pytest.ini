[pytest]
# Django settings module for tests
DJANGO_SETTINGS_MODULE = ordoc_ai.settings_test

# Test discovery patterns
python_files = test_*.py *_test.py tests.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths =
    test/backend
    backend

# Coverage options
addopts =
    --verbose
    --strict-markers
    --cov=backend
    --cov-report=html:test/backend/htmlcov
    --cov-report=term-missing:skip-covered
    --cov-report=xml:test/backend/coverage.xml
    --cov-fail-under=75
    --reuse-db
    -p no:warnings

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    fast: marks tests as fast
    integration: integration tests
    unit: unit tests
    fsm: FSM state machine tests (require 100% coverage)
    api: API endpoint tests
    models: model tests
    serializers: serializer tests
    permissions: permission tests

# Ignore warnings from third-party libraries
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Django database configuration
django_db_signature = True
